<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dispatch — JeevanKey</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#101720;--paper:#fff;--field:#f4f6f8;--line:#d9dfe6;--muted:#5d6b7a;--navy:#0C447C;--amber:#B26A00;--red:#A31D1D;--ok:#1F6B4A}
*{box-sizing:border-box}
body{margin:0;background:#eef1f4;color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:15px;line-height:1.5}
.wrap{max-width:820px;margin:0 auto;padding:16px 14px 60px}
.masthead{background:var(--navy);color:#fff;padding:14px 16px;border-radius:4px}
.masthead h1{font-size:16px;margin:0}
.card{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:16px;margin-top:12px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 4px}
input{width:100%;font-family:inherit;font-size:15px;padding:9px 10px;border:1px solid var(--line);border-radius:3px;background:var(--field)}
button{font-family:inherit;font-size:14px;font-weight:600;padding:10px 16px;border-radius:3px;border:1px solid var(--navy);background:var(--navy);color:#fff;cursor:pointer}
button.ghost{background:#fff;color:var(--navy)}
.gate{max-width:340px;margin:60px auto;text-align:center}

table{width:100%;border-collapse:collapse;margin-top:8px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:14px}
th{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
td.ref{font-family:'IBM Plex Mono',monospace;font-weight:600}
.dot{display:inline-block;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:12px;font-weight:700}
.dot.on{background:#e0f0e8;color:var(--ok)}
.dot.off{background:#f2e3e3;color:var(--red)}
.n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.mkbtn{padding:6px 12px;font-size:13px}

/* printable sheet — matches the A4 report paper.
   Top ~34% (up to ~290pt of 842) is left BLANK: on the physical report stock
   that zone holds the QR, barcode, and patient detail box. This page prints
   as a separate A4 sheet appended to the report, same stock, same identity. */
#sheet{margin-top:16px}
.psheet{background:#fff;color:#000;font-family:Helvetica,Arial,sans-serif;font-size:11px;line-height:1.45;
  width:210mm;min-height:297mm;margin:0 auto;padding:0;position:relative}
.psheet .reserved{height:96mm}         /* blank zone = report header area */
.psheet .body{padding:0 14mm}
.psheet .title{text-align:center;font-weight:700;font-size:12px;text-decoration:underline;
  letter-spacing:.02em;margin:0 0 10px}
.psheet .box{border:1px solid #000;padding:7px 10px;font-size:10.5px;
  display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;margin-bottom:14px}
.psheet h3{font-size:11px;font-weight:700;margin:14px 0 5px;border-bottom:1px solid #000;padding-bottom:3px}
.psheet ul{margin:0;padding-left:16px}.psheet li{margin-bottom:4px}
.psheet .val{font-weight:700}
.flag{border:1px solid #000;padding:8px 11px;margin:12px 0;font-weight:700;font-size:11px}
.psheet .coupon{border:1.5px dashed #000;padding:12px;text-align:center;margin-top:18px}
.psheet .coupon .code{font-family:'Courier New',monospace;font-size:16px;font-weight:700;letter-spacing:.05em;margin:5px 0}
.psheet .web{font-weight:700;margin-top:4px}
.psheet .revline{margin-top:18px;padding-top:8px;border-top:1px solid #000;font-size:10px}
.psheet .disc{font-size:9px;color:#333;margin-top:6px}
.gen{font-size:9px;color:#888;font-style:italic;font-weight:400}

@media print{
  @page{size:A4;margin:0}
  body{background:#fff}.noprint{display:none!important}
  .wrap{padding:0;max-width:none}
  .psheet{width:210mm;min-height:297mm;margin:0}
}
</style>
</head>
<body>
<div class="wrap">

<div id="gate" class="gate">
  <div class="masthead"><h1>JeevanKey — Dispatch</h1></div>
  <div class="card">
    <label for="pass">Passcode</label>
    <input id="pass" type="password">
    <button style="margin-top:12px;width:100%" onclick="unlock()">Open</button>
    <p id="gerr" style="color:var(--red);font-size:13px"></p>
  </div>
</div>

<div id="app" style="display:none">
  <div class="masthead noprint"><h1>Dispatch board — today</h1></div>

  <div class="card noprint">
    <label>Add ref numbers to check (comma-separated), or leave blank for today's submitted refs</label>
    <div style="display:flex;gap:8px">
      <input id="refs" placeholder="2607133031, 2607131794">
      <button onclick="loadBoard()" style="flex:none">Refresh</button>
    </div>
    <table id="board"><thead><tr><th>Ref</th><th>Doctor</th><th>Dietician</th><th>Yoga</th><th>Status</th><th></th></tr></thead><tbody></tbody></table>
  </div>

  <div id="sheet"></div>
</div>
</div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbwnsEyKfhTAKdIpQwQU2jn2tUEHCU_gH36zvJJCQj8GaL7eMqfAfp8OKKoNDQrCxJY/exec';
var $=function(id){return document.getElementById(id)};
var esc=function(s){return String(s||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})};
var PASS='';

/* generic fallbacks when a role hasn't reviewed — NO name attached.
   Note: there is deliberately NO generic "chinta ki baat nahi" — that line
   only appears when a doctor actually reviewed. */
var GENERIC={
  questions:['Yeh values kis wajah se aisi hain?','Kya aur koi jaanch zaroori hai?','Agli baar poori jaanch kab karwani chahiye?'],
  diet:'Santulit khana khayein — sabziyan, dal, saabut anaj. Zyada tala-bhuna aur meetha kam karein. Paani theek matra mein piyein.',
  yoga:'Roz thodi walking ya halki stretching karein. Neend poori lein. Koi bhi bhaari abhyas shuru karne se pehle apne doctor se poochh lein.'
};

function unlock(){
  PASS=$('pass').value.trim();
  if(!PASS){$('gerr').textContent='Enter passcode.';return}
  $('gate').style.display='none';$('app').style.display='block';
  loadBoard();
}

function loadBoard(){
  fetch(API_URL+'?action=status&pass='+encodeURIComponent(PASS))
    .then(function(r){return r.json()}).then(function(res){
      if(!res.ok){alert('Error: '+res.error);return}
      var refs=Object.keys(res.status||{});
      var typed=$('refs').value.split(',').map(function(s){return s.trim()}).filter(Boolean);
      typed.forEach(function(r){if(refs.indexOf(r)<0)refs.push(r)});
      var tb=$('board').querySelector('tbody');tb.innerHTML='';
      if(!refs.length){tb.innerHTML='<tr><td colspan="6" class="n">No reviews submitted today yet.</td></tr>';return}
      refs.forEach(function(ref){
        var s=res.status[ref]||{doctor:false,dietician:false,yoga:false};
        var done=[s.doctor,s.dietician,s.yoga].filter(Boolean).length;
        var label=done===3?'Complete':done===0?'None — dispatch plain':done+' of 3';
        tb.innerHTML+='<tr><td class="ref">'+esc(ref)+'</td>'
          +cell(s.doctor)+cell(s.dietician)+cell(s.yoga)
          +'<td class="n">'+label+'</td>'
          +'<td>'+(done>0?'<button class="mkbtn" onclick="makeSheet(\''+esc(ref)+'\')">Make sheet</button>':'')+'</td></tr>';
      });
    }).catch(function(){alert('Network error.')});
}
function cell(on){return '<td><span class="dot '+(on?'on':'off')+'">'+(on?'✓':'–')+'</span></td>'}

function makeSheet(ref){
  fetch(API_URL+'?action=getReviews&ref='+encodeURIComponent(ref)+'&pass='+encodeURIComponent(PASS))
    .then(function(r){return r.json()}).then(function(res){
      if(!res.ok){alert('Error: '+res.error);return}
      renderSheet(res.report||{}, res.reviews||{});
    });
}

function renderSheet(rep, rv){
  var doc=rv.doctor?rv.doctor.data:null;
  var die=rv.dietician?rv.dietician.data:null;
  var yog=rv.yoga?rv.yoga.data:null;

  var flag='';
  if(doc && doc.triage==='priority')
    flag='<div class="flag">Yeh report '+esc(doc.window)+' din ke andar apne doctor ko dikhana zaroori hai.</div>';

  var pr = doc && doc.primary && doc.primary.length
    ? '<h3>Sabse zaroori</h3><ul>'+doc.primary.map(function(p){return '<li><span class="val">'+esc(p[0])+'</span>'+(p[1]?' — '+esc(p[1]):'')+'</li>'}).join('')+'</ul>' : '';
  var se = doc && doc.secondary && doc.secondary.length
    ? '<h3>Dhyan rakhne wali</h3><ul>'+doc.secondary.map(function(s){return '<li>'+esc(s)+'</li>'}).join('')+'</ul>' : '';

  /* "chinta ki baat nahi" ONLY when a doctor actually reviewed. No generic version. */
  var normalBlock = (doc && doc.normal)
    ? '<h3>Chinta ki baat nahi</h3><p>'+esc(doc.normal)+'</p>' : '';

  /* questions: doctor's if present, else general */
  var qs = (doc && doc.questions && doc.questions.length) ? doc.questions : GENERIC.questions;
  var qGen = !(doc && doc.questions && doc.questions.length);
  var qHtml='<h3>Apne doctor se poochhein '+(qGen?'<span class="gen">(general)</span>':'')+'</h3><ul>'
    +qs.map(function(q){return '<li>'+esc(q)+'</li>'}).join('')+'</ul>';

  var dietTxt = die && die.diet ? die.diet : GENERIC.diet;
  var dietGen = !(die && die.diet);
  var yogaTxt = yog && yog.yoga ? yog.yoga : GENERIC.yoga;
  var yogaGen = !(yog && yog.yoga);

  /* reviewer names, matching Immuno report footer style: "Name" on its own line */
  var names=[];
  if(rv.doctor && rv.doctor.reviewer) names.push(esc(rv.doctor.reviewer));
  if(rv.dietician && rv.dietician.reviewer) names.push(esc(rv.dietician.reviewer));
  if(rv.yoga && rv.yoga.reviewer) names.push(esc(rv.yoga.reviewer));

  var labFull = rep.Lab || '';   /* full "Sample From" name, e.g. S.B PATHOLOGY LAB */
  var coupon = rep.Coupon || ('JK-'+String(rep.Ref||'').slice(-4));

  $('sheet').innerHTML=
   '<div class="noprint" style="text-align:center;margin:16px 0"><button onclick="window.print()">Print / Save PDF</button>'
   +'<span style="margin-left:12px;color:var(--muted);font-size:13px">Prints as a separate A4 page on report stock.</span></div>'
   +'<div class="psheet"><div class="reserved"></div><div class="body">'
   +'<div class="title">JEEVANKEY REPORT REVIEW</div>'
   +'<div class="box">'
   +'<div>Ref No. : '+esc(rep.Ref||'')+'</div><div>Age/Sex : '+esc(rep.Age||'')+' / '+esc(rep.Sex||'')+'</div>'
   +'<div>Profile : '+esc(rep.Profile||'')+'</div><div>Lab : '+esc(labFull)+'</div>'
   +'<div style="grid-column:1/-1">Name : '+esc(rep.Patient||'')+'</div></div>'
   +flag+pr+se+normalBlock+qHtml
   +'<h3>Khane mein '+(dietGen?'<span class="gen">(general)</span>':'')+'</h3><p>'+esc(dietTxt)+'</p>'
   +'<h3>Dincharya mein '+(yogaGen?'<span class="gen">(general)</span>':'')+'</h3><p>'+esc(yogaTxt)+'</p>'
   +'<div class="coupon">Report par baat karni hai?<br>'
   +'<span style="font-size:10px">Ek Doctor + ek Health Expert — dono aapke apne doctor ke saath kaam karenge</span>'
   +'<div class="code">'+esc(coupon)+'</div>'
   +'<div>Doctor + Health Expert · ₹499</div>'
   +'<div class="web">jeevankey.com · WhatsApp 97600 15878</div></div>'
   +'<div class="revline">'+(names.length?'Review by: '+names.join(' &nbsp; ')+'':'')+'</div>'
   +'<div class="disc">Yeh diagnosis nahi hai. Ilaaj ka faisla hamesha aapke doctor ka hoga. '
   +'Kisi test ya dawai se JeevanKey ke kisi expert ki koi kamai nahi hai.</div>'
   +'</div></div>';
  $('sheet').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
